<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keetrax Ad Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f0fa;
    --surface: #ffffff;
    --surface2: #f8f2fb;
    --border: #eadff3;
    --accent: #3d235f;
    --accent2: #e0678c;
    --text: #2d1c43;
    --muted: #715d87;
    --muted2: #9885ab;
    --tag-bg: #f1e8f8;
    --tag-text: #5e4479;
    --green: #1e9a6d;
    --radius: 10px;
    --sidebar: 256px;
  }

  body {
    font-family: "Open Sans", "Segoe UI", sans-serif;
    background:
      radial-gradient(1100px 400px at 100% -10%, rgba(224,103,140,.16), transparent 60%),
      radial-gradient(900px 380px at -10% -20%, rgba(61,35,95,.1), transparent 64%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(61, 35, 95, .06);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: "Montserrat", "Open Sans", sans-serif;
    font-weight: 800; font-size: 16px; letter-spacing: -.2px; white-space: nowrap;
    color: var(--text);
  }
  .logo span { color: var(--accent2); }

  .search-wrap { flex: 1; max-width: 480px; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; padding: 8px 12px 8px 34px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  #search:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(224,103,140,.16); }
  #search::placeholder { color: var(--muted); }

  .stats { color: var(--muted); font-size: 13px; white-space: nowrap; margin-left: auto; }

  .body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar); flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto; overflow-x: hidden;
    padding: 16px 0;
  }

  .filter-section { margin-bottom: 4px; }
  .filter-title {
    padding: 6px 16px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
  }

  .filter-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 6px 16px;
    background: none; border: none; color: var(--tag-text);
    cursor: pointer; font-size: 13px; text-align: left;
    border-left: 2px solid transparent;
    transition: background .1s, color .1s, border-color .1s;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { color: var(--accent); border-left-color: var(--accent2); background: rgba(224,103,140,.12); }
  .filter-btn .count {
    font-size: 11px; color: var(--muted2); background: var(--tag-bg);
    padding: 1px 6px; border-radius: 10px;
  }
  .filter-btn.active .count { background: rgba(61,35,95,.12); color: var(--accent); }

  .divider { height: 1px; background: var(--border); margin: 8px 16px; }

  /* ── Grid ── */
  .grid-wrap { flex: 1; overflow-y: auto; padding: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 3px 14px rgba(61,35,95,.04);
    transition: border-color .15s, transform .15s, box-shadow .15s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent2); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(61,35,95,.1); }
  .card.selected { border-color: var(--accent2); outline: 2px solid var(--accent2); outline-offset: -1px; }

  .card-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    background: var(--surface2);
    display: block;
  }
  .card-img-placeholder {
    width: 100%; aspect-ratio: 1/1;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted2); font-size: 11px;
  }

  .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .card-name {
    font-family: "Montserrat", "Open Sans", sans-serif;
    font-weight: 700; font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-id {
    font-size: 11px;
    color: var(--muted2);
    font-family: "SF Mono", "Fira Code", monospace;
    word-break: break-all;
    line-height: 1.35;
  }
  .card-desc {
    font-size: 12px; color: var(--muted);
    display: -webkit-box; line-clamp: 2; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .pill {
    font-size: 11px; padding: 2px 7px; border-radius: 20px;
    background: var(--tag-bg); color: var(--tag-text);
    white-space: nowrap;
  }
  .pill.cat { background: rgba(224,103,140,.14); color: #9d2c53; }
  .pill.source-keetrax { background: rgba(52,211,153,.15); color: var(--green); }

  .card-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .btn {
    flex: 1; padding: 6px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    transition: background .12s, color .12s, border-color .12s;
    text-align: center;
  }
  .btn:hover { background: linear-gradient(135deg, var(--accent), #5c378c); border-color: var(--accent); color: #fff; }
  .btn.copied { background: rgba(52,211,153,.15); border-color: var(--green); color: var(--green); }

  /* ── Detail panel ── */
  .detail {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,12,33,.7); backdrop-filter: blur(4px);
    padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .detail.open { opacity: 1; pointer-events: all; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 780px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    display: grid; grid-template-columns: 260px 1fr;
    transform: translateY(12px); transition: transform .2s;
  }
  .detail.open .detail-panel { transform: translateY(0); }

  .detail-img-col {
    background: var(--surface2);
    border-right: 1px solid var(--border);
    padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    border-radius: 14px 0 0 14px;
  }
  .detail-thumb {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 8px; cursor: zoom-in; opacity: .6; transition: opacity .15s;
    border: 2px solid transparent;
  }
  .detail-thumb.active, .detail-thumb:hover { opacity: 1; border-color: var(--accent); }

  .detail-content { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .detail-name { font-size: 18px; font-weight: 700; color: var(--text); }
  .detail-close {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 4px 10px;
    cursor: pointer; font-size: 18px; line-height: 1;
    flex-shrink: 0;
  }
  .detail-close:hover { color: var(--text); }

  .detail-row { display: flex; gap: 8px; align-items: flex-start; }
  .detail-label { color: var(--muted); font-size: 12px; min-width: 90px; padding-top: 2px; }
  .detail-val { color: var(--text); font-size: 13px; display: flex; flex-wrap: wrap; gap: 4px; }

  .detail-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .cmd-block {
    background: #2f1f45; border: 1px solid #4c3469;
    border-radius: 8px; padding: 12px 14px;
    font-family: "SF Mono", "Fira Code", monospace; font-size: 12px;
    color: #f8d8e3; white-space: pre-wrap; word-break: break-all;
    position: relative;
  }
  .cmd-copy {
    position: absolute; top: 8px; right: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 5px; padding: 3px 8px;
    cursor: pointer; font-size: 11px; font-family: inherit;
    transition: color .12s;
  }
  .cmd-copy:hover { color: var(--text); }
  .cmd-copy.copied { color: var(--green); }

  /* ── Image lightbox ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 120;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(19, 10, 32, .9);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s;
  }
  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }
  .lightbox-img {
    max-width: min(1200px, 96vw);
    max-height: 90vh;
    width: auto;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 20px 80px rgba(0, 0, 0, .45);
    object-fit: contain;
  }
  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
  }

  /* ── Empty state ── */
  .empty {
    grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .detail-panel { grid-template-columns: 1fr; }
    .detail-img-col {
      display: flex;
      flex-direction: row;
      border-right: none;
      border-bottom: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      overflow-x: auto;
      padding: 12px;
    }
    .detail-thumb {
      width: 124px;
      min-width: 124px;
    }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="logo">Keetrax <span>Ad Library</span></div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search by name, tag, style…" autocomplete="off">
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="body">

    <!-- Sidebar filters -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Card grid -->
    <main class="grid-wrap">
      <div class="grid" id="grid"></div>
    </main>

  </div>
</div>

<!-- Detail overlay -->
<div class="detail" id="detail">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-img-col" id="detail-imgs"></div>
    <div class="detail-content" id="detail-content"></div>
  </div>
</div>

<!-- Full-screen preview lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" type="button" aria-label="Close image preview" onclick="closeImageLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" alt="Template preview">
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ALL = [];
let filters = { category: null, product_type: null, mood: null, use_case: null, source: null };
let query = '';

// ── Boot ───────────────────────────────────────────────────────────────────
fetch('library.json')
  .then(r => r.json())
  .then(data => {
    ALL = data.templates;
    buildSidebar();
    render();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="empty"><h3>Could not load library.json</h3><p>Make sure library.json is in the same directory as index.html.</p></div>';
  });

// ── Helpers ────────────────────────────────────────────────────────────────
function counts(key, arr) {
  const m = {};
  arr.forEach(t => {
    const vals = Array.isArray(t[key]) ? t[key] : [t[key]];
    vals.forEach(v => { if (v) m[v] = (m[v] || 0) + 1; });
  });
  return m;
}

function allMoods() {
  const m = {};
  ALL.forEach(t => (t.mood || []).forEach(v => { m[v] = (m[v] || 0) + 1; }));
  return m;
}

function allUseCases() {
  const m = {};
  ALL.forEach(t => (t.use_cases || []).forEach(v => { m[v] = (m[v] || 0) + 1; }));
  return m;
}

function filtered() {
  return ALL.filter(t => {
    if (filters.category && t.category !== filters.category) return false;
    if (filters.product_type && !(t.product_types || []).includes(filters.product_type)) return false;
    if (filters.mood && !(t.mood || []).includes(filters.mood)) return false;
    if (filters.use_case && !(t.use_cases || []).includes(filters.use_case)) return false;
    if (filters.source && t.source !== filters.source) return false;
    if (query) {
      const q = query.toLowerCase();
      const haystack = [t.name, t.description, ...(t.tags || []), ...(t.mood || [])].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function label(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function peelgenCmd(t) {
  if (t.source === 'keetrax') return `# Custom Keetrax template — see prompt block above`;
  return `python3 peelgen.py info ${t.id.slice(0, 8)}\n\npython3 peelgen.py prompt \\\n  --template ${t.id.slice(0, 8)} \\\n  --image clients/[client]/inputs/product.jpg \\\n  --logo  clients/[client]/assets/logo.png \\\n  --out   clients/[client]/prompts/draft.txt`;
}

function claudePrompt(t) {
  const tid = t.source === 'keetrax' ? t.id : t.id.slice(0, 8);
  return `Generate an ad for [CLIENT] using peelkit template ${tid}.\nProduct image: clients/[CLIENT]/inputs/product.jpg\nLogo: clients/[CLIENT]/assets/logo.png`;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const cats = counts('category', ALL);
  const pts = counts('product_types', ALL);  // product_types is an array
  const ptsCounted = {};
  ALL.forEach(t => (t.product_types || []).forEach(v => { ptsCounted[v] = (ptsCounted[v] || 0) + 1; }));
  const moods = allMoods();
  const uses = allUseCases();
  const sources = counts('source', ALL);

  let html = '';

  html += section('Browse', [
    { key: null, val: null, label: 'All templates', count: ALL.length, filterKey: 'all' }
  ], 'all');

  html += `<div class="divider"></div>`;
  html += section('Category', Object.entries(cats).sort((a,b) => b[1]-a[1]).map(([v,c]) => ({filterKey:'category', key:'category', val:v, label:label(v), count:c})), 'category');

  html += `<div class="divider"></div>`;
  html += section('Product Type', Object.entries(ptsCounted).sort((a,b) => b[1]-a[1]).map(([v,c]) => ({filterKey:'product_type', key:'product_type', val:v, label:label(v), count:c})), 'product_type');

  html += `<div class="divider"></div>`;
  html += section('Mood', Object.entries(moods).sort((a,b) => b[1]-a[1]).map(([v,c]) => ({filterKey:'mood', key:'mood', val:v, label:label(v), count:c})), 'mood');

  html += `<div class="divider"></div>`;
  html += section('Use Case', Object.entries(uses).sort((a,b) => b[1]-a[1]).map(([v,c]) => ({filterKey:'use_case', key:'use_case', val:v, label:label(v), count:c})), 'use_case');

  html += `<div class="divider"></div>`;
  html += section('Source', Object.entries(sources).map(([v,c]) => ({filterKey:'source', key:'source', val:v, label:label(v), count:c})), 'source');

  sb.innerHTML = html;
  sb.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const fk = btn.dataset.filterKey;
      const val = btn.dataset.val || null;
      if (fk === 'all') {
        filters = { category: null, product_type: null, mood: null, use_case: null, source: null };
      } else {
        filters[fk] = filters[fk] === val ? null : val;
      }
      updateSidebarActive();
      render();
    });
  });
}

function section(title, items, filterKey) {
  let html = `<div class="filter-section"><div class="filter-title">${title}</div>`;
  items.forEach(item => {
    html += `<button class="filter-btn" data-filter-key="${item.filterKey || filterKey}" data-val="${item.val || ''}">${item.label}<span class="count">${item.count}</span></button>`;
  });
  html += `</div>`;
  return html;
}

function updateSidebarActive() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const fk = btn.dataset.filterKey;
    const val = btn.dataset.val;
    if (fk === 'all') {
      btn.classList.toggle('active', !Object.values(filters).some(Boolean));
    } else {
      btn.classList.toggle('active', filters[fk] === (val || null));
    }
  });
}

// ── Grid ───────────────────────────────────────────────────────────────────
function render() {
  const results = filtered().sort((a, b) => {
    const da = a.added_at || '0000-00-00';
    const db = b.added_at || '0000-00-00';
    return db < da ? -1 : db > da ? 1 : (a.name || '').localeCompare(b.name || '');
  });
  const grid = document.getElementById('grid');
  document.getElementById('stats').textContent = `${results.length} of ${ALL.length} templates`;

  if (!results.length) {
    grid.innerHTML = '<div class="empty"><h3>No templates found</h3><p>Try adjusting your filters or search.</p></div>';
    return;
  }

  grid.innerHTML = results.map(t => {
    const imgUrl = (t.preview_images || [])[0];
    const imgEl = imgUrl
      ? `<img class="card-img" src="${imgUrl}" alt="${t.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">No preview</div>`
      : `<div class="card-img-placeholder">No preview</div>`;

    const topTags = (t.tags || []).filter(tag => !['health-beauty','pets','home-electronics','product-photo','infographic','lifestyle','ingredients','social-proof','how-to-process','comparisons'].includes(tag)).slice(0, 3);

    return `<div class="card" data-id="${t.id}" onclick="openDetail('${t.id}')">
      ${imgEl}
      <div class="card-body">
        <div class="card-name" title="${t.name || 'Untitled'}">${t.name || 'Untitled'}</div>
        <div class="card-id" title="${t.id}">${t.id}</div>
        ${t.description ? `<div class="card-desc">${t.description}</div>` : ''}
        <div class="card-meta">
          <span class="pill cat">${label(t.category)}</span>
          ${t.source === 'keetrax' ? '<span class="pill source-keetrax">Keetrax</span>' : ''}
          ${topTags.map(tag => `<span class="pill">${label(tag)}</span>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        <button class="btn" onclick="event.stopPropagation();copyCmd('${t.id}',this)">Copy Prompt</button>
        <button class="btn" onclick="event.stopPropagation();copyClaudePrompt('${t.id}',this)" title="Copy a ready-made Claude prompt for this template">Ask Kee</button>
      </div>
    </div>`;
  }).join('');
}

function copyCmd(id, btn) {
  const t = ALL.find(x => x.id === id);
  if (!t) return;
  navigator.clipboard.writeText(peelgenCmd(t));
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1800);
}

function copyClaudePrompt(id, btn) {
  const t = ALL.find(x => x.id === id);
  if (!t) return;
  navigator.clipboard.writeText(claudePrompt(t));
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Ask Kee'; btn.classList.remove('copied'); }, 1800);
}

// ── Detail panel ───────────────────────────────────────────────────────────
function openDetail(id) {
  const t = ALL.find(x => x.id === id);
  if (!t) return;

  const imgs = t.preview_images || [];
  const imgCol = document.getElementById('detail-imgs');
  imgCol.innerHTML = imgs.length
    ? imgs.map((url, i) => `<img class="detail-thumb ${i===0?'active':''}" src="${url}" alt="Preview ${i+1}" onclick="setThumb(this, '${escAttr(url)}')">`).join('')
    : `<div style="color:var(--muted2);font-size:12px;padding:8px">No previews</div>`;

  const mainImg = imgs[0] || '';
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${t.name || 'Untitled'}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px;word-break:break-all">${t.id}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    ${t.description ? `<div class="detail-desc">${t.description}</div>` : ''}
    <div class="detail-row">
      <span class="detail-label">Category</span>
      <span class="detail-val"><span class="pill cat">${label(t.category)}</span></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Product types</span>
      <span class="detail-val">${(t.product_types||[]).map(p=>`<span class="pill">${label(p)}</span>`).join('')}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Layout</span>
      <span class="detail-val"><span class="pill">${label(t.layout||'unknown')}</span></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Text density</span>
      <span class="detail-val"><span class="pill">${label(t.text_density||'medium')}</span></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Mood</span>
      <span class="detail-val">${(t.mood||[]).map(m=>`<span class="pill">${label(m)}</span>`).join('')}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Use cases</span>
      <span class="detail-val">${(t.use_cases||[]).map(u=>`<span class="pill">${label(u)}</span>`).join('')}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Tags</span>
      <span class="detail-val">${(t.tags||[]).map(tag=>`<span class="pill">${tag}</span>`).join('')}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Source</span>
      <span class="detail-val"><span class="pill ${t.source==='keetrax'?'source-keetrax':''}">${t.source}</span></span>
    </div>
    ${t.prompt ? `
    <div>
      <div class="detail-label" style="margin-bottom:6px">Prompt</div>
      <div class="cmd-block">${escHtml(t.prompt.slice(0,600))}${t.prompt.length>600?'\n…[truncated]':''}<button class="cmd-copy" onclick="copyText(this,'${escAttr(t.prompt)}')">Copy</button></div>
    </div>` : ''}
    <div>
      <div class="detail-label" style="margin-bottom:6px">peelgen.py command</div>
      <div class="cmd-block">${escHtml(peelgenCmd(t))}<button class="cmd-copy" onclick="copyText(this,\`${escAttr(peelgenCmd(t))}\`)">Copy</button></div>
    </div>
    <div>
      <div class="detail-label" style="margin-bottom:6px">Claude prompt</div>
      <div class="cmd-block" style="color:#86efac">${escHtml(claudePrompt(t))}<button class="cmd-copy" onclick="copyText(this,\`${escAttr(claudePrompt(t))}\`)">Copy</button></div>
    </div>
  `;

  document.getElementById('detail').classList.add('open');
}

function closeDetail() { document.getElementById('detail').classList.remove('open'); }
document.getElementById('detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('open')) {
    closeImageLightbox();
    return;
  }
  closeDetail();
});

function setThumb(el, url) {
  document.querySelectorAll('.detail-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  openImageLightbox(url, 'Template preview');
}

function openImageLightbox(url, altText) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = url;
  img.alt = altText || 'Template preview';
  lb.classList.add('open');
}

function closeImageLightbox() {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  lb.classList.remove('open');
  img.src = '';
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeImageLightbox();
});

function copyText(btn, text) {
  navigator.clipboard.writeText(text);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s)
    .replace(/\\/g,'\\\\')
    .replace(/`/g,'\\`')
    .replace(/\$/g,'\\$')
    .replace(/'/g,"\\'");
}

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

// ── Init sidebar active ────────────────────────────────────────────────────
// "All templates" active by default — triggered after sidebar builds
setTimeout(updateSidebarActive, 50);
</script>
</body>
</html>
